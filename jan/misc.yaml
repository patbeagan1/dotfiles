            \      ;;\n        *)\n            echo \"Unknown option: $1\"\n     \
            \       show_help\n            exit 1\n            ;;\n    esac\ndone\n\
            \nmain \"$@\"\nJAN_EOF_intensify_intensify_sh_8ba6156fb211\nchmod +x \"\
