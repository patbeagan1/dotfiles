            \  return cardsByRarity[rarity][\n            Math.floor(Math.random()\
            \ * cardsByRarity[rarity].length)\n          ];\n        } catch (e) {\n\
            \          console.log(e)\n          console.log(cardsByRarity);\n   \
            \       console.log(rarity);\n          return []\n        }\n      }\n\
