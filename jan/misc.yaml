            #!/bin/bash\n\n# Function to handle text-to-speech based on the operating\
            \ system\ntext_to_speech() {\n    local message=$1\n    echo \"$message\"\
            \n    if [[ \"$OSTYPE\" == \"darwin\"* ]]; then\n        say \"$message\"\
            \n    elif [[ \"$OSTYPE\" == \"linux-gnu\"* ]]; then\n        spd-say\
