            \ buildBooster(resolvedCards, cardsByRarity);\n      allCards.push(cards);\n\
            \      console.log(cards.map((it) => it ? it.name : \"UNKNOWN\"));\n \
            \     const output = createBoosterFileContent(cards);\n      const filename\
