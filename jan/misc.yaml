            #!/usr/bin/env zsh\n\n# fe.zsh - A Zsh file explorer using fzf, chafa,\
            \ and bat.\n# All code is in a single file for easy portability and use.\n\
            \n#--- Preview Function ---\n# This function generates the content for\
