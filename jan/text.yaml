            \ method: {method}\")\n\n        # Add \\space after each word, except\
            \ for the last one\n        if i < len(words) - 1:\n            colorized_parts.append(\"\
            \ \\\\space \")\n\n    return \"$$\" + \"\".join(colorized_parts) + \"\
