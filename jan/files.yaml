            \ depth):\n            print(\"Depth: %s\" % depth)\n            loop_through_files(root,\
            \ files)\n    else:\n        for root, dirs, files in os.walk(sys.argv[1],\
            \ topdown=False):\n            loop_through_files(root, files)\n\n   \
