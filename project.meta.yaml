name: dotfiles
description: A collection of shell functions and scripts for zsh, including aliases, configurations, and utilities. Designed to be sourced into your zsh environment for enhanced productivity and automation.
language: shell
tags:
- shell
- zsh
- dotfiles
- configuration
- aliases
- utilities
scripts:
  install:
    command: ./install.zsh
  test:
    command: make test
  lint:
    command: make lint
  publish:
    command: ../monorepo subtree push dotfiles
  pull:
    command: ../monorepo subtree pull dotfiles
subtree:
  repo: git@github.com:patbeagan1/dotfiles.git
  prefix: dotfiles
  branch: master
roadmap:
  todo:
  - Add more robust automated installation for different OSes (macOS, Linux)
  - Expand test coverage for shell functions and scripts
  - Refactor alias organization for better discoverability
  - Add support for Fish and Bash configuration
  - Enhanced bootstrap/setup/docs for new machines
  in_progress:
  - Modularize core scripts into well-documented files
  - Improve make lint/test commands for CI compatibility
  - Review and update README/docs to cover advanced usage
  done:
  - Core zsh aliases, functions, and utilities curated
  - Initial make test and make lint integration
  - Subtree integration and publish/pull script support
  - Public documentation and GitHub repo established
publishing:
- target: github-projects
- target: docs
